name: CI

# Hardening: actions fixadas por SHA de commit completo (imutável — mitiga
# supply-chain via reescrita de tag). O comentário `# vX.Y` registra a versão; o
# Dependabot (.github/dependabot.yml) atualiza os SHAs automaticamente.

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Lint + Test (backend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: Set up Python
        run: uv python install 3.12

      # Instala EXATAMENTE o conjunto pinado do uv.lock (o mesmo que a imagem de
      # produção instala via `uv export --frozen`) + extra dev. `--locked` falha
      # se o lock estiver desatualizado em relação ao pyproject (gate anti-drift).
      - name: Install dependencies (pinned from uv.lock)
        run: uv sync --locked --extra dev

      - name: Ruff (lint)
        run: .venv/bin/ruff check .

      - name: Black (format check)
        run: .venv/bin/black --check .

      - name: Pytest
        run: .venv/bin/pytest -q

      # SAST do nosso código (não do .venv). Falha em qualquer issue (bandit -ll
      # = medium+). O código já roda limpo localmente.
      - name: Bandit (SAST Python)
        run: .venv/bin/bandit -r app -ll

      # Vulnerabilidades conhecidas nas dependências Python (CVE/GHSA).
      - name: pip-audit (deps Python)
        run: .venv/bin/pip-audit --progress-spinner off --skip-editable

  security:
    name: Secrets + SAST + Vuln + SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Semgrep SAST — rulesets de SEGURANÇA (não p/default, que traz regras de
      # estilo/correção ruidosas). Falha o build em achado de segurança.
      - name: Semgrep (SAST)
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d # v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/python
            p/javascript

      # Instalacao direta do trivy (o wrapper trivy-action fixava um
      # setup-trivy@v0.2.1 ja removido). Scanner de vulnerabilidades; segredos
      # ficam por conta do gitleaks acima.
      - name: Trivy (filesystem vuln scan)
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b "$RUNNER_TEMP/trivy"
          "$RUNNER_TEMP/trivy/trivy" fs --scanners vuln --severity CRITICAL,HIGH --ignore-unfixed --exit-code 1 .

      # SBOM (CycloneDX) do repositório — inventário de dependências para auditoria
      # e rastreabilidade de supply-chain. Publicado como artefato.
      - name: Generate SBOM (syft)
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b "$RUNNER_TEMP/syft"
          "$RUNNER_TEMP/syft/syft" dir:. -o cyclonedx-json="$RUNNER_TEMP/sbom.cyclonedx.json"

      - name: Upload SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-cyclonedx
          path: ${{ runner.temp }}/sbom.cyclonedx.json

  frontend:
    name: Lint + Audit (frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Build
        run: npm run build

      # Falha só em HIGH/CRITICAL. Moderadas transitivas (ex.: postcss bundlado
      # pelo Next) não bloqueiam — não processamos CSS de terceiros.
      - name: npm audit (prod deps)
        run: npm audit --omit=dev --audit-level=high
