name: CI

# Hardening: actions fixadas por SHA de commit completo (imutável — mitiga
# supply-chain via reescrita de tag). O comentário `# vX.Y` registra a versão; o
# Dependabot (.github/dependabot.yml) atualiza os SHAs automaticamente.

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Lint + Test (backend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0

      - name: Set up Python
        run: uv python install 3.12

      # Instala EXATAMENTE o conjunto pinado do uv.lock (o mesmo que a imagem de
      # produção instala via `uv export --frozen`) + extra dev. `--locked` falha
      # se o lock estiver desatualizado em relação ao pyproject (gate anti-drift).
      - name: Install dependencies (pinned from uv.lock)
        run: uv sync --locked --extra dev

      - name: Ruff (lint)
        run: .venv/bin/ruff check .

      - name: Black (format check)
        run: .venv/bin/black --check .

      - name: Pytest
        run: .venv/bin/pytest -q

      # SAST do nosso código (não do .venv). Falha em qualquer issue (bandit -ll
      # = medium+). O código já roda limpo localmente.
      - name: Bandit (SAST Python)
        run: .venv/bin/bandit -r app -ll

      # Vulnerabilidades conhecidas nas dependências Python (CVE/GHSA).
      - name: pip-audit (deps Python)
        run: .venv/bin/pip-audit --progress-spinner off --skip-editable

  security:
    name: Secrets + SAST + Vuln + SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Semgrep SAST — rulesets de SEGURANÇA (não p/default, que traz regras de
      # estilo/correção ruidosas). Falha o build em achado de segurança.
      - name: Semgrep (SAST)
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d # v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/python
            p/javascript

      # Instalacao direta do trivy. install.sh pinado por SHA de commit IMUTAVEL
      # + binario em VERSAO FIXA (mesma politica de pin das actions). Antes baixava
      # de 'main' (branch mutavel) e instalava 'latest' => RCE latente no proprio
      # job de seguranca (achado Fortaleza ALTO). Bump e manual (curl nao entra no
      # Dependabot); migrar p/ action oficial pinada por SHA fica no roadmap.
      - name: Trivy (filesystem vuln scan)
        env:
          TRIVY_INSTALL_SHA: 75c4dc0f45c5d7ffd05ae26df1e0c666787bdf2a  # contrib/install.sh @ v0.72.0
          TRIVY_VERSION: v0.72.0
        run: |
          curl -sfL "https://raw.githubusercontent.com/aquasecurity/trivy/${TRIVY_INSTALL_SHA}/contrib/install.sh" | sh -s -- -b "$RUNNER_TEMP/trivy" "${TRIVY_VERSION}"
          "$RUNNER_TEMP/trivy/trivy" fs --scanners vuln --severity CRITICAL,HIGH --ignore-unfixed --exit-code 1 .

      # SBOM (CycloneDX) do repositório — inventário de dependências para auditoria
      # e rastreabilidade de supply-chain. Publicado como artefato. install.sh
      # pinado por SHA de commit IMUTAVEL + versao fixa (ver nota do trivy acima).
      - name: Generate SBOM (syft)
        env:
          SYFT_INSTALL_SHA: e854078fb02b7704f5630818662144d12096dac2  # install.sh @ v1.49.0
          SYFT_VERSION: v1.49.0
        run: |
          curl -sSfL "https://raw.githubusercontent.com/anchore/syft/${SYFT_INSTALL_SHA}/install.sh" | sh -s -- -b "$RUNNER_TEMP/syft" "${SYFT_VERSION}"
          "$RUNNER_TEMP/syft/syft" dir:. -o cyclonedx-json="$RUNNER_TEMP/sbom.cyclonedx.json"

      - name: Upload SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-cyclonedx
          path: ${{ runner.temp }}/sbom.cyclonedx.json

  frontend:
    name: Lint + Audit (frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Build
        run: npm run build

      # Falha só em HIGH/CRITICAL. Moderadas transitivas (ex.: postcss bundlado
      # pelo Next) não bloqueiam — não processamos CSS de terceiros.
      - name: npm audit (prod deps)
        run: npm audit --omit=dev --audit-level=high
